# netlify.toml
#
# Build + redirect configuration for Netlify.
#
# • Build the Vite app and publish the contents of `dist/`.
# • Functions live in `netlify/functions/` (see `kimchi.js`).
#
# Note: The actual URL → function redirect lives in `public/_redirects`
# (which Vite copies to `dist/_redirects` at build time). Netlify's
# `_redirects` file is processed at the CDN edge with higher priority than
# rules in `netlify.toml` for the same path, so the API redirect is
# declared there to avoid the catch-all SPA rule from `public/_redirects`
# shadowing it. We keep this file only for the function declaration
# (`[build]` block) and as a safety net for the SPA fallback.

[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Single-page-app fallback. Mirrors the rule in `public/_redirects`;
# declared here as a safety net in case `_redirects` is ever removed.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  force  = false